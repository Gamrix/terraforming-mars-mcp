[mcp_servers.terraforming-mars]
command = "/root/repos/terraforming-mars-mcp/.venv/bin/python"
args = [
  "-m",
  "terraforming_mars_mcp.server",
]
tool_timeout_sec = 600

[mcp_servers.terraforming-mars.env]
TM_SERVER_URL = "http://localhost:8080"
TM_MCP_LOG_FILE = "/tmp/terraforming-mars-mcp.log"
PYTHONPATH = "/root/repos/terraforming-mars-mcp"
